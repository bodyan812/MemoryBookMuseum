vich_uploader:
    db_driver: orm  # Указываем, что используем Doctrine ORM

    mappings:
        veteran_photo:
            uri_prefix: /uploads/photos
            upload_destination: '%kernel.project_dir%/public/uploads/photos'
            namer: Vich\UploaderBundle\Naming\OrignameNamer

        media_file:
            uri_prefix: /uploads/media
            upload_destination: '%kernel.project_dir%/public/uploads/media'
            namer: Vich\UploaderBundle\Naming\OrignameNamer
